<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#16181d">
<title>Gowes — Cycling Route Planner</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="assets/icon-192.png">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --asphalt: #16181d;
    --asphalt-2: #21242c;
    --line: #33373f;
    --hivis: #d7fb3e;
    --hivis-dim: #a7c72e;
    --route: #e0007a;
    --gpx: #0f7bff;
    --text: #f2f3f5;
    --text-dim: #9aa0ab;
    --danger: #ff5a5a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Barlow', system-ui, sans-serif;
    background: var(--asphalt);
    color: var(--text);
    -webkit-tap-highlight-color: transparent;
  }
  #map { position: absolute; inset: 0; }

  /* ---------- top bar ---------- */
  .topbar {
    position: absolute; top: 0; left: 0; right: 0;
    padding: calc(env(safe-area-inset-top, 0px) + 10px) 12px 10px;
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    pointer-events: none;
    z-index: 10;
  }
  .brand {
    pointer-events: auto;
    background: var(--asphalt);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 7px 12px 6px;
    display: flex; align-items: baseline; gap: 6px;
    box-shadow: 0 4px 16px rgba(0,0,0,.35);
  }
  .brand b {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 20px; letter-spacing: .04em;
    color: var(--hivis); text-transform: uppercase;
  }
  .brand span { font-size: 11px; color: var(--text-dim); letter-spacing: .06em; text-transform: uppercase; }

  .search-box {
    pointer-events: auto;
    position: relative;
    order: 3;
    flex: 1 1 100%;
  }
  .search-box input {
    width: 100%;
    background: var(--asphalt);
    border: 1px solid var(--line);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 16px;
    padding: 11px 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,.35);
  }
  .search-box input::placeholder { color: var(--text-dim); }
  .search-box input:focus { outline: 2px solid var(--hivis); outline-offset: -1px; }
  .search-results {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--asphalt); border: 1px solid var(--line);
    border-radius: 10px; overflow: hidden;
    box-shadow: 0 4px 16px rgba(0,0,0,.35);
    display: none; max-height: 240px; overflow-y: auto;
  }
  .search-results.show { display: block; }
  .search-results button {
    display: block; width: 100%; text-align: left;
    appearance: none; border: 0; background: transparent;
    color: var(--text); font-family: 'Barlow', sans-serif;
    font-size: 12.5px; padding: 9px 10px; cursor: pointer;
    border-bottom: 1px solid var(--line);
  }
  .search-results button:last-child { border-bottom: 0; }
  .search-results button:hover, .search-results button:focus-visible { background: var(--asphalt-2); }
  .search-results .empty { color: var(--text-dim); padding: 9px 10px; font-size: 12.5px; }

  .profile-picker {
    pointer-events: auto;
    margin-left: auto;
    display: flex;
    background: var(--asphalt);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(0,0,0,.35);
  }
  .profile-picker button {
    appearance: none; border: 0; background: transparent;
    color: var(--text-dim);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600; font-size: 14px; letter-spacing: .05em;
    text-transform: uppercase;
    padding: 12px 13px; min-height: 44px; cursor: pointer;
  }
  .profile-picker button + button { border-left: 1px solid var(--line); }
  .profile-picker button.active { background: var(--hivis); color: #14160a; }
  .profile-picker button:focus-visible { outline: 2px solid var(--hivis); outline-offset: -2px; }

  /* ---------- side actions ---------- */
  .actions {
    position: absolute; right: 12px; bottom: 148px;
    display: flex; flex-direction: column; gap: 8px;
    z-index: 10;
    transition: bottom .25s ease;
  }
  body.chart-open .actions { bottom: 268px; }
  .fab {
    width: 46px; height: 46px; border-radius: 12px;
    background: var(--asphalt); border: 1px solid var(--line);
    color: var(--text); cursor: pointer;
    display: grid; place-items: center;
    box-shadow: 0 4px 16px rgba(0,0,0,.35);
  }
  .fab:active { transform: scale(.94); }
  .fab:focus-visible { outline: 2px solid var(--hivis); outline-offset: 2px; }
  .fab svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .fab.danger { color: var(--danger); }
  .fab[disabled] { opacity: .4; cursor: default; }

  /* ---------- bottom computer ---------- */
  .computer {
    position: absolute; left: 0; right: 0; bottom: 0;
    background: var(--asphalt);
    border-top: 1px solid var(--line);
    padding: 8px 16px calc(env(safe-area-inset-bottom, 0px) + 12px);
    z-index: 10;
  }
  .computer .hint {
    font-size: 12.5px; color: var(--text-dim);
    margin: 2px 0 8px; line-height: 1.35;
  }
  .computer .hint b { color: var(--hivis); font-weight: 600; }
  .readout { display: flex; align-items: stretch; }
  .stat { flex: 1; min-width: 0; }
  .stat + .stat { border-left: 1px solid var(--line); padding-left: 14px; margin-left: 14px; }
  .stat .label {
    font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 1px;
  }
  .stat .value {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 30px; line-height: 1;
    color: var(--text); font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .stat .value small {
    font-size: 14px; font-weight: 600; color: var(--text-dim);
    margin-left: 3px; letter-spacing: .03em;
  }
  .stat.accent .value { color: var(--hivis); }
  .est-line { font-size: 11.5px; color: var(--text-dim); margin-top: 6px; }
  .est-line b { color: var(--text); font-weight: 600; }

  .chart-toggle {
    appearance: none; width: 100%;
    background: transparent; border: 0; border-top: 1px dashed var(--line);
    margin-top: 10px; padding: 8px 0 0;
    color: var(--text-dim); cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 600;
    letter-spacing: .12em; text-transform: uppercase;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .chart-toggle:focus-visible { outline: 2px solid var(--hivis); outline-offset: 2px; }
  .chart-toggle .chev { transition: transform .2s ease; display: inline-block; }
  body.chart-open .chart-toggle .chev { transform: rotate(180deg); }

  .chart-wrap {
    height: 0; overflow: hidden; transition: height .25s ease;
    position: relative;
  }
  body.chart-open .chart-wrap { height: 120px; }
  #elevChart { width: 100%; height: 110px; display: block; margin-top: 10px; touch-action: none; }
  .chart-empty {
    position: absolute; inset: 10px 0 0;
    display: grid; place-items: center;
    color: var(--text-dim); font-size: 12.5px;
    pointer-events: none;
  }
  .chart-readout {
    position: absolute; top: 12px; right: 4px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600; font-size: 13px; letter-spacing: .04em;
    color: var(--hivis);
    background: rgba(22,24,29,.85);
    padding: 2px 8px; border-radius: 6px;
    display: none; pointer-events: none;
  }

  .status-pill {
    position: absolute; left: 50%; transform: translateX(-50%);
    bottom: 134px;
    background: var(--asphalt); border: 1px solid var(--line);
    color: var(--text); font-size: 13px;
    border-radius: 999px; padding: 7px 14px;
    box-shadow: 0 4px 16px rgba(0,0,0,.35);
    z-index: 11; display: none;
    max-width: 82vw; text-align: center;
    transition: bottom .25s ease;
  }
  body.chart-open .status-pill { bottom: 254px; }
  .status-pill.show { display: block; }
  .status-pill.err { border-color: var(--danger); color: var(--danger); }

  /* markers */
  .wp {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--asphalt); border: 2px solid var(--hivis);
    color: var(--hivis);
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px;
    display: grid; place-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.4);
    cursor: grab;
  }
  .wp.start { background: var(--hivis); color: #14160a; border-color: var(--hivis); }
  .wp.end { background: var(--route); color: #fff; border-color: var(--route); }
  .elev-dot {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--hivis); border: 3px solid #14160a;
    box-shadow: 0 0 0 2px var(--hivis);
    pointer-events: none;
  }

  input[type="file"] { display: none; }

  /* ---------- gpx multi-track picker ---------- */
  .gpx-picker {
    position: absolute; inset: 0; z-index: 20;
    background: rgba(0,0,0,.55);
    display: none; align-items: flex-end;
  }
  .gpx-picker.show { display: flex; }
  .gpx-picker-inner {
    width: 100%; max-height: 60vh; overflow-y: auto;
    background: var(--asphalt); border-top: 1px solid var(--line);
    border-radius: 14px 14px 0 0;
    padding: 14px 12px calc(env(safe-area-inset-bottom, 0px) + 14px);
  }
  .gpx-picker-title {
    font-size: 12.5px; color: var(--text-dim); padding: 4px 8px 10px;
  }
  .gpx-picker-list button {
    display: block; width: 100%; text-align: left;
    appearance: none; border: 0; background: transparent;
    color: var(--text); font-family: 'Barlow', sans-serif;
    font-size: 14px; padding: 12px 10px; cursor: pointer;
    border-top: 1px solid var(--line);
  }
  .gpx-picker-list button:first-child { border-top: 0; }
  .gpx-picker-list button:hover, .gpx-picker-list button:focus-visible { background: var(--asphalt-2); }
  @media (min-width: 640px) {
    .gpx-picker { align-items: center; justify-content: center; }
    .gpx-picker-inner { width: 380px; border-radius: 14px; border: 1px solid var(--line); }
  }

  /* ---------- navigation mode ---------- */
  .puck { width: 22px; height: 22px; display: grid; place-items: center; }
  .puck-arrow {
    width: 0; height: 0;
    border-left: 8px solid transparent; border-right: 8px solid transparent;
    border-bottom: 16px solid var(--gpx);
    filter: drop-shadow(0 0 4px rgba(15,123,255,.8));
  }

  .nav-instruction {
    position: absolute; top: 0; left: 0; right: 0;
    background: var(--asphalt-2); border-bottom: 1px solid var(--line);
    padding: calc(env(safe-area-inset-top, 0px) + 14px) 16px 14px;
    display: none; align-items: center; gap: 14px;
    z-index: 12; box-shadow: 0 4px 16px rgba(0,0,0,.35);
  }
  body.nav-mode .nav-instruction { display: flex; }
  .nav-arrow {
    width: 46px; height: 46px; border-radius: 12px; flex-shrink: 0;
    background: var(--hivis); color: #14160a;
    display: grid; place-items: center;
    transition: transform .3s ease;
  }
  .nav-arrow svg { width: 26px; height: 26px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .nav-arrow.dir-kiri { transform: scaleX(-1); }
  .nav-arrow.dir-uturn { transform: rotate(135deg); }
  .nav-instruction-dist {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    font-size: 26px; color: var(--text); line-height: 1;
  }
  .nav-instruction-label { font-size: 13px; color: var(--text-dim); margin-top: 3px; }

  .nav-recenter {
    position: absolute; right: 12px; bottom: 108px; z-index: 13;
    display: none;
  }
  .nav-recenter.show { display: grid; }

  .nav-panel {
    position: absolute; left: 0; right: 0; bottom: 0;
    background: var(--asphalt); border-top: 1px solid var(--line);
    padding: 14px 16px calc(env(safe-area-inset-bottom, 0px) + 14px);
    display: none; align-items: center; gap: 12px;
    z-index: 12;
  }
  body.nav-mode .nav-panel { display: flex; }
  body.nav-mode .computer, body.nav-mode .actions,
  body.nav-mode .topbar, body.nav-mode .status-pill,
  body.nav-mode .maplibregl-ctrl-top-right { display: none; }
  .nav-stat { flex: 1; display: flex; align-items: baseline; gap: 12px; }
  .nav-dist {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    font-size: 32px; color: var(--hivis); font-variant-numeric: tabular-nums;
  }
  .nav-dist small { font-size: 15px; color: var(--text-dim); margin-left: 3px; }
  .nav-eta { font-size: 14px; color: var(--text-dim); }
  .nav-exit {
    width: 46px; height: 46px; border-radius: 12px; flex-shrink: 0;
    background: var(--danger); border: 0; color: #14160a; cursor: pointer;
    display: grid; place-items: center;
  }
  .nav-exit svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; }

  @media (min-width: 640px) {
    .computer { left: 12px; right: auto; bottom: 12px; width: 380px; border: 1px solid var(--line); border-radius: 14px; }
    .actions, body.chart-open .actions { bottom: 24px; }
    .status-pill, body.chart-open .status-pill { bottom: 24px; left: auto; right: 70px; transform: none; }
    .search-box { order: 0; flex: 1 1 auto; max-width: 260px; }
  }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>

<div id="map"></div>

<div class="topbar">
  <div class="brand"><b>Gowes</b><span>route planner</span></div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Cari lokasi…" autocomplete="off">
    <div class="search-results" id="searchResults"></div>
  </div>
  <div class="profile-picker" role="group" aria-label="Profil rute">
    <button data-profile="gravel" class="active">Gravel</button>
    <button data-profile="fastbike">Roadbike</button>
    <button data-profile="mtb">MTB</button>
  </div>
</div>

<div class="actions">
  <button class="fab" id="btnNav" title="Mulai navigasi" aria-label="Mulai navigasi" disabled>
    <svg viewBox="0 0 24 24"><path d="M3 11l18-8-8 18-2.5-7.5L3 11z"/></svg>
  </button>
  <button class="fab" id="btnGpx" title="Buka file GPX" aria-label="Buka file GPX">
    <svg viewBox="0 0 24 24"><path d="M12 16V4M12 4l-4 4M12 4l4 4"/><path d="M4 16v3a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-3"/></svg>
  </button>
  <button class="fab" id="btnExport" title="Simpan rute sebagai GPX" aria-label="Simpan rute sebagai GPX" disabled>
    <svg viewBox="0 0 24 24"><path d="M12 4v12M12 16l-4-4M12 16l4-4"/><path d="M4 16v3a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-3"/></svg>
  </button>
  <button class="fab" id="btnUndo" title="Hapus titik terakhir" aria-label="Hapus titik terakhir">
    <svg viewBox="0 0 24 24"><path d="M9 14 4 9l5-5"/><path d="M4 9h10a6 6 0 0 1 0 12h-3"/></svg>
  </button>
  <button class="fab danger" id="btnClear" title="Hapus semua" aria-label="Hapus semua">
    <svg viewBox="0 0 24 24"><path d="M4 7h16M10 11v6M14 11v6M6 7l1 13h10l1-13M9 7V4h6v3"/></svg>
  </button>
</div>

<div class="status-pill" id="status"></div>

<div class="computer">
  <div class="hint" id="hint"><b>Tap peta</b> untuk taruh titik — rute sepeda dibuat otomatis. Titik bisa digeser. Atau buka file <b>GPX</b>.</div>
  <div class="readout">
    <div class="stat accent">
      <div class="label">Jarak</div>
      <div class="value" id="statDist">0<small>km</small></div>
    </div>
    <div class="stat">
      <div class="label">Tanjakan</div>
      <div class="value" id="statAsc">0<small>m</small></div>
    </div>
    <div class="stat">
      <div class="label">Titik</div>
      <div class="value" id="statWp">0</div>
    </div>
  </div>
  <div class="est-line" id="estLine"></div>
  <button class="chart-toggle" id="chartToggle" aria-expanded="false">
    Profil elevasi <span class="chev">▾</span>
  </button>
  <div class="chart-wrap">
    <canvas id="elevChart"></canvas>
    <div class="chart-empty" id="chartEmpty">Belum ada rute atau GPX dengan data elevasi</div>
    <div class="chart-readout" id="chartReadout"></div>
  </div>
</div>

<div class="nav-instruction" id="navInstruction">
  <div class="nav-arrow" id="navArrow"><svg viewBox="0 0 24 24"><path d="M8 5l8 7-8 7"/></svg></div>
  <div class="nav-instruction-text">
    <div class="nav-instruction-dist" id="navInstDist">--</div>
    <div class="nav-instruction-label" id="navInstLabel">Menuju tujuan</div>
  </div>
</div>

<button class="fab nav-recenter" id="btnRecenter" title="Kembali ke lokasi saya" aria-label="Kembali ke lokasi saya">
  <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
</button>

<div class="nav-panel" id="navPanel">
  <div class="nav-stat">
    <div class="nav-dist" id="navDist">0<small>km</small></div>
    <div class="nav-eta" id="navEta">-- menit</div>
  </div>
  <button class="nav-exit" id="btnNavExit" aria-label="Keluar navigasi">
    <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>
  </button>
</div>

<div class="gpx-picker" id="gpxPicker">
  <div class="gpx-picker-inner">
    <div class="gpx-picker-title">File ini punya beberapa track — pilih satu</div>
    <div class="gpx-picker-list" id="gpxPickerList"></div>
  </div>
</div>

<input type="file" id="gpxInput" accept=".gpx,application/gpx+xml">

<script src="js/app.js"></script>
</body>
</html>
